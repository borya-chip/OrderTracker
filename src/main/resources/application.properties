spring.config.import=optional:file:.env[.properties]
spring.application.name=Order Tracker

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true

logging.level.com.order.tracker=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=ERROR

logging.file.name=./logs/application.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.total-size-cap=1GB

spring.output.ansi.enabled=ALWAYS

logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){cyan} \
  %clr(%-5level){%clr(ERROR){red}%clr(WARN){yellow}%clr(INFO){green}%clr(DEBUG){blue}%clr(TRACE){magenta}} \
  %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){yellow} %clr(:){faint} %m%n%clr(%ex){red}
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n%ex
