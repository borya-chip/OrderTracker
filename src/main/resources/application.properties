spring.config.import=optional:file:.env[.properties]
spring.application.name=Order Tracker

server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:${POSTGRES_USER}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.jpa.defer-datasource-initialization=true

logging.level.com.order.tracker=DEBUG
